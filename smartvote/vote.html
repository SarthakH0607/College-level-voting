<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartVote — Cast Your Vote</title>
  <meta name="description" content="Vote in your college election by position">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo"><span>🗳️</span> SmartVote</a>
    <div class="nav-right">
      <a href="profile.html"><img src="https://ui-avatars.com/api/?name=S&background=2563eb&color=fff&size=36" alt="Profile" class="nav-profile" id="nav-profile-img"></a>
      <a href="#" class="btn btn-ghost btn-sm logout-btn">Logout</a>
      <button id="hamburger-btn">☰</button>
    </div>
  </nav>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section-label">Menu</div>
    <ul class="sidebar-nav">
      <li><a href="index.html">📊 Dashboard</a></li>
      <li><a href="results.html">📈 Results</a></li>
      <li><a href="profile.html">👤 My Profile</a></li>
    </ul>
    <div class="sidebar-section-label">Account</div>
    <ul class="sidebar-nav">
      <li><a href="#" class="logout-btn">🚪 Logout</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1 id="election-title">Loading Election...</h1>
      <p id="election-desc">Vote for each position below — select one candidate per position</p>
    </div>

    <!-- Position-based voting sections will be injected here -->
    <div id="positions-container">
      <div class="empty-state"><div class="empty-icon">⏳</div><h3>Loading candidates by position...</h3></div>
    </div>

    <div style="text-align:center; margin-top:32px;">
      <div id="selection-summary" style="margin-bottom:16px; font-size:.9rem; color:var(--text-light);"></div>
      <button class="btn btn-primary btn-lg" id="submit-vote-btn" disabled>Submit All Votes</button>
      <p style="margin-top:8px; font-size:.85rem; color:var(--text-light);" id="vote-hint">Select one candidate per position to vote</p>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth-guard.js"></script>

  <script>
    const electionId = Utils.getParam('id');
    if (!electionId) window.location.href = 'index.html';

    // Track selections per position: { "CR": candidateId, "Vice CR": candidateId, ... }
    let selections = {};
    let positionsList = [];
    let userData = null;

    AuthGuard.protect(async (user, data) => {
      userData = data;

      // Check if already voted
      if (data.votedIn && data.votedIn.includes(electionId)) {
        Utils.showToast('You have already voted in this election.', 'warning');
        setTimeout(() => window.location.href = 'index.html', 1500);
        return;
      }

      // Load election
      const elDoc = await db.collection('elections').doc(electionId).get();
      if (!elDoc.exists) {
        Utils.showToast('Election not found.', 'error');
        setTimeout(() => window.location.href = 'index.html', 1500);
        return;
      }
      const election = elDoc.data();
      document.getElementById('election-title').textContent = election.title;
      document.getElementById('election-desc').textContent = election.description || 'Vote for each position below';

      if (election.status !== 'active') {
        Utils.showToast('This election is not active.', 'warning');
        setTimeout(() => window.location.href = 'index.html', 1500);
        return;
      }

      // Load candidates and group by position
      const candSnap = await db.collection('candidates').where('electionId', '==', electionId).get();
      const container = document.getElementById('positions-container');

      if (candSnap.empty) {
        container.innerHTML = `<div class="empty-state"><div class="empty-icon">👤</div><h3>No candidates yet</h3></div>`;
        return;
      }

      // Group candidates by position
      const byPosition = {};
      candSnap.forEach(doc => {
        const c = { id: doc.id, ...doc.data() };
        const pos = c.position || 'General';
        if (!byPosition[pos]) byPosition[pos] = [];
        byPosition[pos].push(c);
      });

      positionsList = Object.keys(byPosition);
      container.innerHTML = '';

      // Build position sections
      positionsList.forEach(position => {
        const candidates = byPosition[position];
        const section = document.createElement('div');
        section.className = 'position-section animate-fade-in';
        section.innerHTML = `
          <h2>
            <span class="position-badge">${position}</span>
            Select one candidate
          </h2>
          <div class="candidates-grid" id="pos-${CSS.escape(position)}">
            ${candidates.map(c => `
              <div class="candidate-card" data-id="${c.id}" data-position="${position}">
                <img src="${c.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(c.name) + '&background=2563eb&color=fff&size=80'}" alt="${Utils.escapeHtml(c.name)}">
                <h3>${Utils.escapeHtml(c.name)}</h3>
                <p class="position">${Utils.escapeHtml(position)}</p>
                ${c.manifesto ? `<p class="manifesto">${Utils.escapeHtml(c.manifesto)}</p>` : ''}
              </div>
            `).join('')}
          </div>
        `;
        container.appendChild(section);
      });

      // Add click handlers
      document.querySelectorAll('.candidate-card').forEach(card => {
        card.addEventListener('click', () => {
          const pos = card.dataset.position;
          const id = card.dataset.id;
          // Deselect others in same position
          document.querySelectorAll(`.candidate-card[data-position="${pos}"]`).forEach(cc => cc.classList.remove('selected'));
          card.classList.add('selected');
          selections[pos] = id;
          updateSummary();
        });
      });
    });

    function updateSummary() {
      const total = positionsList.length;
      const selected = Object.keys(selections).length;
      const summary = document.getElementById('selection-summary');
      summary.innerHTML = `✅ ${selected} of ${total} positions selected`;

      const btn = document.getElementById('submit-vote-btn');
      if (selected === total) {
        btn.disabled = false;
        document.getElementById('vote-hint').textContent = 'All positions selected — ready to submit!';
      } else {
        btn.disabled = true;
        document.getElementById('vote-hint').textContent = `Select candidates for ${total - selected} more position(s)`;
      }
    }

    // Submit votes for all positions
    document.getElementById('submit-vote-btn').addEventListener('click', async () => {
      if (Object.keys(selections).length !== positionsList.length) return;
      const btn = document.getElementById('submit-vote-btn');
      Utils.setLoading(btn, true);

      try {
        // Double-check not already voted
        const userDoc = await db.collection('users').doc(auth.currentUser.uid).get();
        if (userDoc.data().votedIn && userDoc.data().votedIn.includes(electionId)) {
          Utils.showToast('You have already voted!', 'error');
          setTimeout(() => window.location.href = 'index.html', 1500);
          return;
        }

        const batch = db.batch();

        // Create vote records for each position
        for (const [position, candidateId] of Object.entries(selections)) {
          const voteRef = db.collection('votes').doc();
          batch.set(voteRef, {
            userId: auth.currentUser.uid,
            electionId: electionId,
            candidateId: candidateId,
            position: position,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            voterRole: 'student',
            biometricVerified: false
          });

          // Increment candidate votes
          batch.update(db.collection('candidates').doc(candidateId), {
            votes: firebase.firestore.FieldValue.increment(1)
          });
        }

        // Update user votedIn
        batch.update(db.collection('users').doc(auth.currentUser.uid), {
          votedIn: firebase.firestore.FieldValue.arrayUnion(electionId)
        });

        // Increment election totalVotes
        batch.update(db.collection('elections').doc(electionId), {
          totalVotes: firebase.firestore.FieldValue.increment(1)
        });

        await batch.commit();

        Utils.showToast('All votes submitted successfully!', 'success');
        setTimeout(() => {
          window.location.href = `confirmation.html?election=${electionId}`;
        }, 600);
      } catch (err) {
        console.error('Vote error:', err);
        Utils.showToast('Failed to submit votes: ' + err.message, 'error');
        Utils.setLoading(btn, false, 'Submit All Votes');
      }
    });
  </script>
</body>
</html>
